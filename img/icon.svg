<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f6ef7"/>
      <stop offset="100%" stop-color="#7c93fa"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- App background (rounded square) -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Back card (rotated, semi-transparent) -->
  <g transform="rotate(-9 256 240)" filter="url(#shadow)">
    <rect x="118" y="140" width="276" height="194" rx="22" fill="rgba(255,255,255,0.38)"/>
  </g>

  <!-- Front card (white) -->
  <rect x="118" y="162" width="276" height="196" rx="22" fill="#ffffff" filter="url(#shadow)"/>

  <!-- Card content: bold line (word) -->
  <rect x="156" y="208" width="200" height="18" rx="9" fill="#c7d3ff"/>
  <!-- Card content: sub lines (meaning) -->
  <rect x="156" y="240" width="158" height="13" rx="6" fill="#e4e8ff"/>
  <rect x="156" y="264" width="180" height="13" rx="6" fill="#e4e8ff"/>

  <!-- Flip / cycle arrow -->
  <path d="M 182 392 A 74 38 0 0 1 330 392"
        stroke="rgba(255,255,255,0.92)" stroke-width="22"
        fill="none" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="320,372 342,394 314,403" fill="rgba(255,255,255,0.92)"/>
</svg>
